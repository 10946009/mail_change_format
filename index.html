<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>XLSX 轉換工具</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
    font-family: Arial;
    padding:40px;
}

input{
    margin:5px 0;
    padding:6px;
}

textarea{
    width:100%;
    height:200px;
    margin-top:10px;
}

button{
    margin-top:10px;
    padding:8px 16px;
}

#toast{
    position:fixed;
    top:20px;
    right:20px;
    background:#333;
    color:white;
    padding:12px 20px;
    border-radius:6px;
    opacity:0;
    transition:opacity .3s;
}

</style>
</head>

<body>

<h2>XLSX 文字轉換工具</h2>

<div>
欄位名稱：
<input id="columnName" value="校外信箱(認證信箱)">
</div>

<div>
分隔符號：
<input id="separator" value=";" style="width:60px">
</div>

<br>

<input type="file" id="fileInput" accept=".xlsx">

<textarea id="result"></textarea>

<br>

<button onclick="copyText()">複製結果</button>

<div id="toast"></div>

<script>

document.getElementById("fileInput").addEventListener("change",function(e){

    const columnName = document.getElementById("columnName").value.trim();
    const separator = document.getElementById("separator").value;

    if(!columnName){
        showToast("請輸入欄位名稱");
        return;
    }

    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(evt){

        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data,{type:"array"});

        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];

        const json = XLSX.utils.sheet_to_json(sheet);

        let values = [];

        json.forEach(row=>{

            const v = row[columnName];

            if(v){
                values.push(v.toString().trim());
            }

        });

        let result = "";

        if(values.length>0){
            result = values.join(separator) + separator;
        }

        document.getElementById("result").value = result;

        showToast("讀取完成，共 "+values.length+" 筆");

    };

    reader.readAsArrayBuffer(file);

});

function copyText(){

    const textarea = document.getElementById("result");

    textarea.select();
    document.execCommand("copy");

    showToast("已複製");

}

function showToast(msg){

    const toast = document.getElementById("toast");

    toast.innerText = msg;
    toast.style.opacity = "1";

    setTimeout(()=>{
        toast.style.opacity = "0";
    },2000);

}

</script>

</body>
</html>
